name: tf-checks
permissions:
  id-token: write
  contents: read
on:
  pull_request:
    paths:
      - '**/*.tf'
      - '*.tf'
jobs:
  bucket-basic:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@master
    with:
      working_directory: './examples/bucket-basic/'
      provider: 'aws'
      enable_plan: 'true'
      show_plan: false 
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  bucket-secure:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@master
    with:
      working_directory: './examples/bucket-secure/'
      provider: 'aws'
      enable_plan: 'true'
      show_plan: false 
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
  domain-cdn:
    if: github.actor != 'dependabot[bot]'
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-checks.yml@master
    with:
      working_directory: './examples/domain-cdn/'
      provider: 'aws'
      enable_plan: 'true'
      show_plan: false 
    secrets:
      BUILD_ROLE: ${{ secrets.BUILD_ROLE }}
